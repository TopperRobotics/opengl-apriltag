<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Calibration</title>
    <script src="js/jquery.js"></script>
    <script src="js/jquery-ui.js"></script>
    <link href="css/jquery-ui.css" rel="stylesheet">
    <link href="css/base.css" rel="stylesheet">
</head>

<body
    class="api jquery-ui wp-singular post-template-default single single-post postid-136 single-format-standard wp-theme-jquery wp-child-theme-apijqueryuicom single-author singular">
    <header>
        <section id="global-nav">
            <nav>
                <div class="constrain">
                    <ul>
                        <li class="project"><a href="/">Home</a></li>
                        <li class="project"><a href="settings.html">Settings</a></li>
                        <li class="project"><a href="cameracalibration.html">Camera Calibration</a></li>
                    </ul>
                </div>
            </nav>
        </section>
    </header>
    <div id="container" class="constrain">
        <div id="content-wrapper" class="clearfix row">
            <div class="content-right twelve columns">
                <div id="content">
                    <img src="" id="mjpegStream" width="640" height="480">
                    <br>
                    <button onclick="takeSnapshot()">Take Snapshot</button><button onclick="clearSnapshots()">Clear
                        Snapshots</button>
                    <br>
                    <p id="snapshotAmount">0</p>
                    <p>/10 Snapshots Taken</p>
                    <br>
                    <button onclick="startCalibration()">Start Calibration</button>
                </div>
                <div id="sidebar" class="widget-area">
                    <aside class="widget">
                        <p>
                            <label for="squaresX-amount">Squares X:</label>
                            <input type="text" id="squaresX-amount" readonly=""
                                style="border:0; color:#f6931f; font-weight:bold;">
                        </p>

                        <div id="squaresX"></div>
                    </aside>

                    <aside class="widget">
                        <p>
                            <label for="squaresY-amount">Squares Y:</label>
                            <input type="text" id="squaresY-amount" readonly=""
                                style="border:0; color:#f6931f; font-weight:bold;">
                        </p>

                        <div id="squaresY"></div>
                    </aside>

                    <aside class="widget">
                        <p>
                            <label for="squareLength-amount">Square Length (mm):</label>
                            <input type="text" id="squareLength-amount" readonly=""
                                style="border:0; color:#f6931f; font-weight:bold;">
                        </p>

                        <div id="squareLength"></div>
                    </aside>

                    <aside class="widget">
                        <p>
                            <label for="markerLength-amount">Marker Length (mm):</label>
                            <input type="text" id="markerLength-amount" readonly=""
                                style="border:0; color:#f6931f; font-weight:bold;">
                        </p>

                        <div id="markerLength"></div>
                    </aside>

                    <aside class="widget">
                        <button id="updateConfigButton" onclick="updateBoardParameters()">Update Parameters</button>
                    </aside>

                    <aside class="widget">
                        <button id="getCalibrationBoardButton" onclick="getCalibrationBoard()">Get Calibration
                            Board</button>
                    </aside>
                </div>
            </div>
        </div>
    </div>
    <div id="calibrationFinishedDialog" title="">
        <p>Calibration has finished. Relaunch the application for changes to take affect.</p>
    </div>
    <div id="calibrationFailedDialog" title="">
        <p>Calibration has failed.</p>
    </div>
    <script>
        var snapshotCount = 0;

        $(function () {
            $("#squaresX").slider({
                range: "min",
                value: 8,
                min: 4,
                max: 12,
                slide: function (event, ui) {
                    $("#squaresX-amount").val("" + ui.value);
                }
            });
            $("#squaresX-amount").val("" + $("#squaresX").slider("value"));
        });

        $(function () {
            $("#squaresY").slider({
                range: "min",
                value: 6,
                min: 4,
                max: 12,
                slide: function (event, ui) {
                    $("#squaresY-amount").val("" + ui.value);
                }
            });
            $("#squaresY-amount").val("" + $("#squaresY").slider("value"));
        });

        $(function () {
            $("#squareLength").slider({
                range: "min",
                value: 30,
                min: 10,
                max: 40,
                slide: function (event, ui) {
                    $("#squareLength-amount").val("" + ui.value);
                }
            });
            $("#squareLength-amount").val("" + $("#squareLength").slider("value"));
        });

        $(function () {
            $("#markerLength").slider({
                range: "min",
                value: 22,
                min: 10,
                max: 40,
                slide: function (event, ui) {
                    $("#markerLength-amount").val("" + ui.value);
                }
            });
            $("#markerLength-amount").val("" + $("#markerLength").slider("value"));
        });

        $(function () {
            $("#calibrationFinishedDialog").dialog({
                autoOpen: false
            });
        });

        $(function () {
            $("#calibrationFailedDialog").dialog({
                autoOpen: false
            });
        });

        async function fetchStreamPort() {
            try {
                const response = await fetch('/streamport');
                const data = await response.json();
                console.log(data.port);
                return data.port;
            } catch (error) {
                console.error('Error fetching stream port:', error);
                return null;
            }
        }
        async function startStream() {
            const port = await fetchStreamPort();
            if (port) {
                document.getElementById('mjpegStream').src = '//' + window.location.hostname + ':' + port + '/';
            } else {
                console.error('Failed to fetch stream port.');
            }

            try {
                await fetch('/stream');
            } catch (error) {
                console.error('Error starting stream:', error);
            }
        }

        function updateBoardParameters() {
            const squaresX = $("#squaresX").slider("value");
            const squaresY = $("#squaresY").slider("value");
            const squareLength = $("#squareLength").slider("value");
            const markerLength = $("#markerLength").slider("value");

            updateBoardParameterKey("squaresX", squaresX);
            updateBoardParameterKey("squaresY", squaresY);
            updateBoardParameterKey("squareLength", squareLength * 1000); // mm to m
            updateBoardParameterKey("markerLength", markerLength * 1000);
        }

        async function updateBoardParameterKey(key, value) {
            try {
                const response = await fetch('/setcalibrationparameters', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // Computed property name [key] fixes the issue
                    body: JSON.stringify({ [key]: value })
                });
                if (!response.ok) {
                    console.error('Failed to update config key:', key);
                }
            } catch (error) {
                console.error('Error updating config key:', error);
            }
        }

        async function takeSnapshot() {
            try {
                const response = await fetch('/takecamerasnapshot', {
                    method: 'GET'
                });
                if (!response.ok) {
                    console.log("Error taking snapshot");
                } else {
                    snapshotCount++;
                    document.getElementById('snapshotAmount').textContent = snapshotCount;
                }
            } catch (error) {
                console.log("Error taking snapshot: ", error);
            }
        }

        async function startCalibration() {
            if (snapshotCount >= 10) {
                try {
                    const response = await fetch('/calibratecamera', {
                        method: 'GET'
                    });
                    if (response.ok) {
                        $("#calibrationFinishedDialog").dialog("open");
                        updateConfigKey("camera_calibration", "camera_calibration.xml");
                    } else {
                        $("#calibrationFailedDialog").dialog("open");
                    }
                } catch (error) {
                    console.log("Error calibrating: ", error);
                }
            } else {
                alert("take 10 snapshots")
            }
        }

        async function clearSnapshots() {
            try {
                const response = await fetch('/clearsnapshots', {
                    method: 'GET'
                });
                if (!response.ok) {
                    console.log("Error clearing snapshots");
                }
                snapshotCount = 0;
            } catch (error) {
                console.log("Error clearing snapshots: ", error);
            }
        }

        async function getCalibrationBoard() {
            try {
                // 1. Fetch the image data
                const response = await fetch("/generatecharuco");

                // 2. Convert the response stream into a Blob (Binary Large Object)
                const blob = await response.blob();

                // 3. Create a temporary local URL pointing to the object blob
                const objectUrl = URL.createObjectURL(blob);

                // 4. Create a hidden virtual anchor element
                const link = document.createElement('a');
                link.href = objectUrl;
                link.download = "charuco.png"; // Defines the fallback file name

                // 5. Append to DOM, click it programmatically, then clean up
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Free up the memory by revoking the object URL
                URL.revokeObjectURL(objectUrl);
            } catch (error) {
                console.error('Failed to download image:', error);
            }
        }

        async function updateConfigKey(key, value) {
            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // Computed property name [key] fixes the issue
                    body: JSON.stringify({ [key]: value })
                });
                if (!response.ok) {
                    console.error('Failed to update config key:', key);
                }
            } catch (error) {
                console.error('Error updating config key:', error);
            }
        }

        startStream();
    </script>
</body>

</html>
